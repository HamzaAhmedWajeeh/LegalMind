[pytest]
# ============================================================
#  LegalMind — Pytest Configuration
# ============================================================

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support (for FastAPI/async test functions)
asyncio_mode = auto

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Markers
markers =
    integration: tests requiring live API keys and running services (deselect with -m "not integration")
    slow: tests that take more than 10 seconds