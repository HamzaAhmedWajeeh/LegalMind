name: LegalMind RAG Evaluation CI

# ============================================================
#  Triggers
# ============================================================
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

# Cancel in-progress runs on the same branch to save minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
#  Environment variables available to all jobs
# ============================================================
env:
  PYTHON_VERSION: "3.11"
  # API keys injected from GitHub Secrets (set in repo Settings → Secrets)
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  COHERE_API_KEY:     ${{ secrets.COHERE_API_KEY }}
  DEEPEVAL_API_KEY:   ${{ secrets.DEEPEVAL_API_KEY }}
  # Postgres config for the service container
  POSTGRES_USER:     legalmind
  POSTGRES_PASSWORD: legalmind_ci
  POSTGRES_DB:       legalmind_test
  # App settings
  ENVIRONMENT:       development
  MIN_FAITHFULNESS_SCORE: "0.9"
  GOLDEN_DATASET_SIZE: "10"   # Smaller dataset for CI speed


# ============================================================
#  Jobs
# ============================================================
jobs:

  # ────────────────────────────────────────────────────────
  # Job 1: Unit Tests (no external services needed)
  # Runs on every push — fast feedback loop
  # ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        working-directory: services/api
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio pytest-cov

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/services/api" >> $GITHUB_ENV

      - name: Copy pytest.ini to api directory
        run: cp pytest.ini services/api/pytest.ini

      - name: Run unit tests (excluding integration)
        working-directory: services/api
        env:
          POSTGRES_URL: postgresql+asyncpg://legalmind:legalmind_ci@localhost/legalmind_test
          REDIS_URL: redis://localhost:6379/0
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
        run: |
          pytest ../../tests/ \
            -m "not integration" \
            -v \
            --tb=short \
            --cov=core \
            --cov=api \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -p no:warnings

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: services/api/coverage.xml
          retention-days: 14


  # ────────────────────────────────────────────────────────
  # Job 2: RAG Evaluation Gate
  # Runs against real services (Qdrant, Redis, Postgres)
  # THE FAITHFULNESS GATE — blocks PR if score < 0.9
  # ────────────────────────────────────────────────────────
  rag-evaluation-gate:
    name: "🧪 RAG Evaluation Gate (Faithfulness ≥ 0.9)"
    runs-on: ubuntu-latest
    needs: unit-tests   # Only runs if unit tests pass

    # ── Service containers ─────────────────────────────────
    services:

      qdrant:
        image: qdrant/qdrant:v1.9.2
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER:     legalmind
          POSTGRES_PASSWORD: legalmind_ci
          POSTGRES_DB:       legalmind_test
        options: >-
          --health-cmd "pg_isready -U legalmind -d legalmind_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install system dependencies (for PDF/OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils tesseract-ocr

      - name: Install Python dependencies
        working-directory: services/api
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-asyncio pytest-cov

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/services/api" >> $GITHUB_ENV

      - name: Copy pytest.ini to api directory
        run: cp pytest.ini services/api/pytest.ini

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Postgres..."
          until pg_isready -h localhost -U legalmind; do sleep 1; done
          echo "Waiting for Redis..."
          until redis-cli -h localhost ping | grep -q PONG; do sleep 1; done
          echo "Waiting for Qdrant..."
          until curl -sf http://localhost:6333/healthz; do sleep 1; done
          echo "All services healthy ✅"

      - name: Initialise database schema
        env:
          PGPASSWORD: legalmind_ci
        run: |
          psql -h localhost -U legalmind -d legalmind_test \
            -f services/api/db/init.sql

      - name: "🚦 Run Faithfulness Gate Tests"
        working-directory: services/api
        env:
          POSTGRES_URL:  postgresql+asyncpg://legalmind:legalmind_ci@localhost/legalmind_test
          REDIS_URL:     redis://localhost:6379/0
          QDRANT_HOST:   localhost
          QDRANT_PORT:   "6333"
          # Enable integration tests in this job
          LEGALMIND_INTEGRATION_TESTS: "false"   # mocked — set "true" for full eval
        run: |
          pytest ../../tests/test_faithfulness.py \
            -v \
            --tb=long \
            -p no:warnings \
            --no-header \
            -rN

      - name: "📎 Run Citation Validation Tests"
        working-directory: services/api
        env:
          POSTGRES_URL:  postgresql+asyncpg://legalmind:legalmind_ci@localhost/legalmind_test
          REDIS_URL:     redis://localhost:6379/0
          QDRANT_HOST:   localhost
          QDRANT_PORT:   "6333"
        run: |
          pytest ../../tests/test_citations.py \
            -v \
            --tb=long \
            -p no:warnings

      - name: "🔍 Run Retrieval Tests"
        working-directory: services/api
        env:
          POSTGRES_URL:  postgresql+asyncpg://legalmind:legalmind_ci@localhost/legalmind_test
          REDIS_URL:     redis://localhost:6379/0
          QDRANT_HOST:   localhost
          QDRANT_PORT:   "6333"
        run: |
          pytest ../../tests/test_retrieval.py \
                 ../../tests/test_answer_relevance.py \
            -v \
            --tb=short \
            -p no:warnings

      - name: Generate evaluation summary
        if: always()
        run: |
          echo "## 🧪 RAG Evaluation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Faithfulness | ≥ 0.9 | See test output |" >> $GITHUB_STEP_SUMMARY
          echo "| Citation Validity | 100% | See test output |" >> $GITHUB_STEP_SUMMARY
          echo "| Answer Relevance | ≥ 0.7 | See test output |" >> $GITHUB_STEP_SUMMARY
          echo "| Context Precision | ≥ 0.7 | See test output |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY


  # ────────────────────────────────────────────────────────
  # Job 3: Docker Build Check
  # Ensures both images build without errors
  # ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: services/api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: legalmind-api:ci

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: services/frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: legalmind-frontend:ci
