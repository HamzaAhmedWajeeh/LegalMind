# ============================================================
#  LegalMind Knowledge Assistant — Docker Compose Stack
#  Services: api | frontend | qdrant | redis | postgres | worker
# ============================================================

services:

  # ----------------------------------------------------------
  # 1. FastAPI — Core RAG pipeline + Agent orchestration
  # ----------------------------------------------------------
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: legalmind_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./services/api:/app
      - ./sample_docs:/app/sample_docs:ro
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - legalmind_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # 2. Celery Worker — Async document ingestion pipeline
  # ----------------------------------------------------------
  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: legalmind_worker
    restart: unless-stopped
    command: celery -A core.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    volumes:
      - ./services/api:/app
      - ./sample_docs:/app/sample_docs:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - legalmind_net

  # ----------------------------------------------------------
  # 3. Streamlit — Chat UI + Evaluation Dashboard
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: legalmind_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    networks:
      - legalmind_net

  # ----------------------------------------------------------
  # 4. Qdrant — Vector Database for semantic search
  # ----------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: legalmind_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - legalmind_net
    healthcheck:
      # Qdrant's image has no curl or wget — use bash built-in TCP check
      # bash /dev/tcp/host/port exits 0 if port open, 1 if not. No tools needed.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ----------------------------------------------------------
  # 5. Redis — Semantic cache + Celery message broker
  # ----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: legalmind_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - legalmind_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # 6. PostgreSQL — Document metadata, audit logs, golden dataset
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: legalmind_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - legalmind_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# ============================================================
#  Named Volumes
# ============================================================
volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local

# ============================================================
#  Networks
# ============================================================
networks:
  legalmind_net:
    driver: bridge
